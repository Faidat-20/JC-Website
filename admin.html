<!DOCTYPE html>
<html lang="en">
  <head>
    <script>
      // Hide page immediately before anything renders
      document.documentElement.style.display = "none";
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jikes Cosmetics | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./mainWebsitePage/mainWebsitePage.css">
    <link rel="stylesheet" href="mainWebsitePage/admin.css">
    <script src="https://kit.fontawesome.com/1fe1b7d9e4.js" crossorigin="anonymous"></script>
  </head>
  <body>

    <header class="navbar" id="navBar">
      <div class="navLeft" id="navLeft">
        <div class="businessName">Jikes Cosmetics</div>
      </div>

      <div class="navCenter">
        <form>
          <div class="search" id="searchBox">
            <input class="searchInput" id="searchInput" type="search" placeholder="Search">
            <i id="icon" class="fa-solid fa-magnifying-glass"></i>
          </div>
        </form>
        <i class="fa-solid fa-xmark closeSearch" id="closeSearch"></i>
      </div>

      <div class="navRight" id="navRight">
        <div class="login">Login</div>
        <div class="logout" id="logoutBtn" style="display: none;">Logout</div>
        <div class="cartWrapper">
          <i id="cart" class="fa-solid fa-cart-arrow-down"></i>
          <span class="countCart">0</span>
          <span class="cartTooltip">Cart</span>
          <span class="addCartMessage">Added to cart</span>
        </div>
      </div>
    </header>

    <div class="pageContent">
      <section class="greeting">
        <div class="greetingOverlay"></div>
        <div class="greetingMessage">
          <h1>Admin</h1>
          <h2>Dashboard</h2>
        </div>
      </section>

      <!-- Home Icon -->
      <div class="homeIconWrapper">
        <a href="mainWebsitePage.html" class="homeIcon" title="Go to Home">
          <i class="fa-regular fa-house"></i>
        </a>
      </div>
    </div>

    <main class="adminMain">

      <!-- ORDER COUNT -->
      <div class="adminTopBar">
        <span id="orderCount" class="orderCount"></span>
      </div>

      <!-- FILTERS -->
      <div class="adminFilters">
        <button class="filterBtn active" data-status="all">All</button>
        <button class="filterBtn" data-status="pending">Pending</button>
        <button class="filterBtn" data-status="shipped">Shipped</button>
        <button class="filterBtn" data-status="delivered">Delivered</button>
        <button class="filterBtn" data-status="cancelled">Cancelled</button>
      </div>

      <!-- ORDERS CONTAINER -->
      <div class="ordersContainer" id="ordersContainer">
        <p class="loadingMsg">Loading orders...</p>
      </div>

    </main>

    <!-- PRODUCT MANAGEMENT -->
    <div class="adminProductSection">
      <div class="adminProductHeader">
        <h2>Product Management</h2>
        <button id="addProductBtn" class="addProductBtn">+ Add New Product</button>
      </div>

      <!-- ADD PRODUCT FORM -->
      <div class="addProductForm" id="addProductForm" style="display: none;">
        <h3>Add New Product</h3>
        <div class="productFormGrid">
          <div class="formField">
            <label>Product Name</label>
            <input type="text" id="newProductName" placeholder="e.g. Lip gloss tube">
          </div>
          <div class="formField">
            <label>Product Image</label>
            <input type="file" id="newProductImageFile" accept="image/*">
            <img id="newProductImagePreview" src="" alt="Preview"
              style="display:none; width:100%; height:120px; object-fit:cover; border-radius:8px; margin-top:8px; border:1px solid #eee;">
            <p id="uploadStatus" style="font-size:11px; color:#4CAF50; margin:4px 0 0;"></p>
          </div>
          <div class="formField">
            <label>Price (₦)</label>
            <input type="number" id="newProductPrice" placeholder="e.g. 10000">
          </div>
          <div class="formField">
            <label>Shop Page</label>
            <select id="newProductPage">
              <option value="mainWebsitePage.html">Page 1</option>
              <option value="shop.html">Shop page</option>
            </select>
          </div>
        </div>
        <div class="productFormActions">
          <button id="saveNewProductBtn" class="saveProductBtn">Save Product</button>
          <button id="cancelAddProductBtn" class="cancelProductBtn">Cancel</button>
        </div>
      </div>

      <!-- PRODUCTS LIST -->
      <div class="adminProductsList" id="adminProductsList">
        <p class="loadingMsg">Loading products...</p>
      </div>
    </div>
    
    <!-- ORDER DETAIL MODAL -->
    <div class="modalOverlay" id="modalOverlay">
      <div class="modalContent">
        <div class="modalHeader">
          <h2>Order Details</h2>
          <span class="closeModal" id="closeModal">&times;</span>
        </div>

        <div class="modalBody" id="modalBody">
          <!-- filled dynamically -->
        </div>
      </div>
    </div>

    <div class="pageOverlay" id="pageOverlay"></div>
    <div class="cartOverlay" id="cartOverlay">
      <div class="cartHeader">
        <h3>Your cart (<span id="cartItemCount">0 item</span>)</h3>
        <i class="fa-solid fa-xmark" id="closeCart"></i>
        <span class="cartOverlayMessage" id="cartOverlayMessage"></span>
      </div>
      <div class="cartItems empty" id="cartItems"></div>
      <div class="cartFooter">
        <div class="subtotal">
          <span>Subtotal:</span>
          <strong>₦<span id="cartSubtotal">0</span></strong>
        </div>
        <button class="checkoutBtn" id="checkoutBtn" disabled>Checkout</button>
        <div class="cartFooterActions">
          <span class="continueShopping" id="continueShopping">Continue shopping</span>
          <span class="clearCart" id="clearCart">× Clear cart</span>
        </div>
      </div>
    </div>

    <footer class="siteFooter">
      <div class="footerContent">
        <div class="footerContact">
          <h3>Contact Us</h3>
          <p><i class="fa-solid fa-phone"></i> 09040472851</p>
          <p><i class="fa-solid fa-phone"></i> 07057181591</p>
        </div>
        <div class="footerSubscribe" id="footerSubscribeBtn">
          <h3>Sign Up for Sales & Updates</h3>
          <button type="submit">Subscribe</button>
        </div>
      </div>
      <div class="footerBottom">
        <a href="https://wa.me/2349040472851" target="_blank" class="whatsappBtn">
          <i class="fa-brands fa-whatsapp"></i>
        </a>
      </div>
    </footer>

    <script src="./mainWebsitePage/mainWebsitePage.js"></script>
    <script src="mainWebsitePage/admin.js"></script>
  </body>
</html>
